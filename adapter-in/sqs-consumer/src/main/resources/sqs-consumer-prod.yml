# ============================================================
# SQS Consumer Layer мҡҙмҳҒ нҷҳкІҪ м„Өм •
# ============================================================
# нҷңм„ұнҷ”: bootstrapмқҳ application-prod.ymlм—җм„ң import
# ============================================================

spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}
      sqs:
        listener:
          max-concurrent-messages: ${SQS_MAX_CONCURRENT_MESSAGES:50}
          max-messages-per-poll: ${SQS_MAX_MESSAGES_PER_POLL:10}

logging:
  level:
    com.ryuqq.fileflow.adapter.in.sqs: INFO
    io.awspring.cloud.sqs: INFO
