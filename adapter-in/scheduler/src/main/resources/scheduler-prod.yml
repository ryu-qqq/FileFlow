# ============================================================
# Scheduler Adapter 운영 환경 설정
# ============================================================
# 활성화: spring.profiles.active=prod
# ============================================================

scheduler:
  jobs:
    download-zombie-recovery:
      # 운영: 5분마다 (공통 설정과 동일, 명시적 선언)
      cron: "0 */5 * * * *"
      batch-size: 100
      timeout-seconds: 300

    transform-zombie-recovery:
      # 운영: 5분마다 (공통 설정과 동일, 명시적 선언)
      cron: "0 */5 * * * *"
      batch-size: 100
      timeout-seconds: 300

    download-queue-outbox:
      # 운영: 1초마다 500건 (PENDING 적체 해소)
      cron: "*/1 * * * * *"
      batch-size: 500

    callback-outbox:
      # 운영: 10초마다 (콜백 알림은 다운로드보다 덜 긴급)
      cron: "*/10 * * * * *"
      batch-size: 50

    transform-callback-outbox:
      # 운영: 10초마다 (변환 콜백 알림)
      cron: "*/10 * * * * *"
      batch-size: 50

    transform-queue-outbox:
      # 운영: 1초마다 500건 (PENDING 적체 해소)
      cron: "*/1 * * * * *"
      batch-size: 500

    single-session-zombie-recovery:
      # 운영: 5분마다 (고아 단건 세션 정리)
      cron: "0 */5 * * * *"
      batch-size: 100

    multipart-session-zombie-recovery:
      # 운영: 5분마다 (고아 멀티파트 세션 정리)
      cron: "0 */5 * * * *"
      batch-size: 100
